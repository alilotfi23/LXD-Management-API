# =============================================================================
# CI pipeline for the LXD Management API
# =============================================================================
# Jobs:
#   lint              - ruff + black + mypy (non-blocking initially)
#   test              - pytest with coverage on Python 3.11 & 3.12
#   build-docker      - build the image, smoke-test /health, tear down
#   security-scan     - pip-audit + bandit (non-blocking initially)
#   docker-image-publish - build & push to GHCR (only on push to main)
#
# Triggers: push to main/develop, PRs against them, and manual dispatch.
# Concurrency: one run per branch/PR; superseded runs are cancelled.
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # required by the publish job to push to GHCR

jobs:
  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff, black, mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check app/ tests/

      - name: Black check
        run: black --check app/ tests/

      # Non-blocking initially; promotes to blocking once types are clean.
      - name: Mypy
        continue-on-error: true
        run: mypy app/

  # ---------------------------------------------------------------------------
  # Test (matrix: Python 3.11 + 3.12)
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term -v

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Build the Docker image and smoke-test /health
  # ---------------------------------------------------------------------------
  build-docker:
    name: Build & smoke-test Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: lxd-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container
        id: run
        run: |
          docker run -d --name lxd-api-ci -p 8000:8000 \
            -e JWT_SECRET=ci-test-secret \
            -e DATABASE_URL=sqlite+aiosqlite:///./data/lxd_api.db \
            lxd-api:ci
          # Wait for the server to come up.
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Server is up"; exit 0
            fi
            sleep 1
          done
          echo "Server did not come up in time"; docker logs lxd-api-ci; exit 1

      - name: Smoke-test /health
        run: |
          set -e
          STATUS=$(curl -sf http://localhost:8000/health | python3 -c "import sys,json;print(json.load(sys.stdin)['status'])")
          echo "Health status: $STATUS"
          [ "$STATUS" = "ok" ] || { echo "Unexpected health status"; exit 1; }

      - name: Tear down
        if: always()
        run: docker rm -f lxd-api-ci || true

  # ---------------------------------------------------------------------------
  # Security scan (non-blocking initially)
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security scan (pip-audit, bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit

      - name: pip-audit (against requirements.txt)
        continue-on-error: true
        run: pip-audit -r requirements.txt

      - name: Bandit (app/)
        continue-on-error: true
        run: bandit -r app/ -ll || true

  # ---------------------------------------------------------------------------
  # Publish to GHCR (only on push to main)
  # ---------------------------------------------------------------------------
  docker-image-publish:
    name: Publish image to GHCR
    needs: [test, build-docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive lowercased owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/lxd-api:latest
            ghcr.io/${{ steps.owner.outputs.name }}/lxd-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Published image :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`ghcr.io/${{ steps.owner.outputs.name }}/lxd-api:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
